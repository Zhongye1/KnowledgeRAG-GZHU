version: "3.9"

# ================================================================
# KnowledgeRAG-GZHU — 完整容器化编排
# 启动方式：docker compose up -d
# 生产部署：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ================================================================

services:

  # ── MySQL 数据库 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ragf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Www028820}
      MYSQL_DATABASE: ${DB_NAME:-rag_user_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"          # 宿主机用 3307 避免与本地 MySQL 冲突
    volumes:
      - mysql_data:/var/lib/mysql
      - ./RagBackend/docs/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Www028820}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ragf-net

  # ── Ollama 本地 LLM 服务 ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ragf-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 加速（有 NVIDIA GPU 时取消注释）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ragf-net

  # ── 模型预拉取（一次性初始化任务）─────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ragf-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo '[ollama-init] 开始拉取模型...' &&
        OLLAMA_HOST=http://ollama:11434 ollama pull ${MODEL:-qwen2:0.5b} &&
        echo '[ollama-init] 模型拉取完成: ${MODEL:-qwen2:0.5b}'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - ragf-net

  # ── FastAPI 后端 ──────────────────────────────────────────────
  backend:
    build:
      context: ./RagBackend
      dockerfile: Dockerfile
    container_name: ragf-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # 数据库（连接容器内 MySQL，主机名用 service 名）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Www028820}
      DB_NAME: ${DB_NAME:-rag_user_db}
      DB_CHARSET: utf8mb4
      # JWT
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_please_replace_in_production}
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL: ${MODEL:-qwen2:0.5b}
      # 多模型云端 API（可选，不填则云端模型不可用）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HUNYUAN_SECRET_ID: ${HUNYUAN_SECRET_ID:-}
      HUNYUAN_SECRET_KEY: ${HUNYUAN_SECRET_KEY:-}
      # 前端地址（QQ 回调跳转）
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8089}
      # Python
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      # 持久化本地文件、向量库、用户头像
      - ragf_files:/app/local-KLB-files
      - ragf_metadata:/app/metadata
      - ragf_avatars:/app/user_avatars
      - ragf_vectorstore:/app/knowledge_base
      # 审计日志 SQLite（持久化到宿主机方便查看）
      - ragf_sqlite:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ragf-net

  # ── Vue3 前端（生产构建 + Nginx 托管）────────────────────────
  frontend:
    build:
      context: ./RagFrontend
      dockerfile: Dockerfile
    container_name: ragf-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8089:80"
    networks:
      - ragf-net

# ── 持久化卷 ──────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local
  ragf_files:
    driver: local
  ragf_metadata:
    driver: local
  ragf_avatars:
    driver: local
  ragf_vectorstore:
    driver: local
  ragf_sqlite:
    driver: local

# ── 网络 ──────────────────────────────────────────────────────
networks:
  ragf-net:
    driver: bridge
